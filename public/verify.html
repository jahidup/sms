<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Verify OTP & Create Account</h2>
    <form id="verifyForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="otp" placeholder="6-digit OTP" required>
      <input type="text" id="username" placeholder="Choose a username (min 3 chars)" minlength="3" required>
      <input type="password" id="password" placeholder="Password (min 6 chars)" required>
      <input type="password" id="confirmPassword" placeholder="Confirm password" required>
      <button type="submit">Create Account</button>
    </form>
    <button id="resendBtn" style="margin-top:10px;">Resend OTP</button>
    <div id="msg" class="message"></div>
    <p><a href="register.html">Back to Register</a></p>
    <div id="loading" class="loading" style="display:none;">Processing...</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
